<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Structured Shared Memory Demo</title>
</head>
<body>
  <script src="shared_struct.js"></script>
  <script>
    const StructBridge = {
      ptr: null,
      // Byte offsets based on C struct layout (int=4, float=4, int=4)
      OFFSETS: { id: 0, value: 4, active: 8 },

      init() {
        this.ptr = _init_packet();
      },

      write(id, val, active) {
        // Create views at the specific pointer address
        const i32 = new Int32Array(Module.HEAP32.buffer, this.ptr, 3);
        const f32 = new Float32Array(Module.HEAP32.buffer, this.ptr, 3);
        
        i32[0] = id;
        f32[1] = val; // value is at offset 4
        i32[2] = active;
      },

      process() {
        _process_packet(this.ptr);
      },

      read() {
        const i32 = new Int32Array(Module.HEAP32.buffer, this.ptr, 3);
        const f32 = new Float32Array(Module.HEAP32.buffer, this.ptr, 3);
        return { id: i32[0], value: f32[1], active: i32[2] };
      },

      free() {
        _free_packet(this.ptr);
      }
    };

    Module.onRuntimeInitialized = () => {
      StructBridge.init();
      
      console.log("Setting initial state: id=101, val=2.5, active=1");
      StructBridge.write(101, 2.5, 1);
      
      StructBridge.process();
      console.log("Result after C processing:", StructBridge.read());

      window.addEventListener("beforeunload", () => StructBridge.free());
    };
  </script>
</body>
</html>
