<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Minimal Shared Int Buffer Demo</title>
</head>
<body>
  <script src="shared_persistent_int.js"></script>
  <script>
    // The SafeBridge encapsulates memory access to prevent direct pointer errors
    const SafeBridge = {
      ptr: null,
      length: 0,
      offset: 0,

      init(len) {
        this.length = len;
        this.ptr = _init_buffer(len);
        this.offset = this.ptr / 4;
      },

      process(factor) {
        if (!this.ptr) return;
        _process_buffer(this.ptr, this.length, factor);
      },

      free() {
        if (this.ptr) {
          _free_buffer(this.ptr);
          this.ptr = null;
        }
      },

      getReadView() {
        return Module.HEAP32.subarray(this.offset, this.offset + this.length);
      },

      writeArray(arr) {
        if (arr.length <= this.length) {
          Module.HEAP32.set(arr, this.offset);
        }
      }
    };

    Module.onRuntimeInitialized = () => {
      const length = 8;
      SafeBridge.init(length);

      let tick = 0;
      function step() {
        // Prepare data safely
        const data = new Int32Array(length);
        for (let i = 0; i < length; ++i) data[i] = (tick * 10) + i;
        
        SafeBridge.writeArray(data);
        console.log("JS wrote:", SafeBridge.getReadView());

        SafeBridge.process(3);
        console.log("After C.process (x3):", SafeBridge.getReadView());
        console.log("---");

        tick++;
        setTimeout(step, 600);
      }

      window.addEventListener("beforeunload", () => SafeBridge.free());

      console.log("Starting safe shared integer buffer demo...");
      step();
    };
  </script>
</body>
</html>
