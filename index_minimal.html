<script>
  const StructBridge = {
    ptr: null,
    
    init() {
      this.ptr = _init_packet();
    },

    // Write to the struct memory directly
    update(id, value, active) {
      const i32 = new Int32Array(Module.HEAP32.buffer, this.ptr, 3);
      const f32 = new Float32Array(Module.HEAP32.buffer, this.ptr, 3);
      
      i32[0] = id;       // id (offset 0)
      f32[1] = value;    // value (offset 4)
      i32[2] = active;   // active (offset 8)
    },

    process(multiplier) {
      _process_packet(this.ptr, multiplier);
    },

    getData() {
      const i32 = new Int32Array(Module.HEAP32.buffer, this.ptr, 3);
      const f32 = new Float32Array(Module.HEAP32.buffer, this.ptr, 3);
      return { id: i32[0], value: f32[1], active: i32[2] };
    },

    free() {
      _free_packet(this.ptr);
    }
  };

  Module.onRuntimeInitialized = () => {
    StructBridge.init();
    StructBridge.update(101, 2.5, 1);
    
    console.log("Before:", StructBridge.getData());
    StructBridge.process(2.0);
    console.log("After:", StructBridge.getData());
    
    StructBridge.free();
  };
</script>
